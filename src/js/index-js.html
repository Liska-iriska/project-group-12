<head>

    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
    <header class="header">
        <div class="container">
            <a class="logo" href="./index.html">Меблерія</a>
        </div>
    </header>

    <main>
        <!-- Секція меблів -->
        <section class="furniture-section" id="furniture">
            <div class="container">
                <h2>Наші меблі</h2>
                <p>Знайдіть ідеальні рішення для вашого інтер'єру</p>

                <!-- Категорії -->
                <ul class="categories-list" data-categories></ul>

                <!-- Список меблів -->
                <ul class="furniture-list" data-furniture-list></ul>

                <!-- Кнопка дозавантаження -->
                <button class="load-more-btn" type="button" data-load-more>
                    Показати ще
                </button>
            </div>
        </section>

        <!-- Секція відгуків -->
        <section class="feedback-section" id="feedback">
            <div class="container">
                <h2>Відгуки клієнтів</h2>
                <p>Дізнайтеся, що кажуть наші задоволені клієнти про наші меблі</p>

                <div class="feedback-slider-wrap">
                    <button class="feedback-nav-btn" type="button" data-feedback-prev>
                        Назад
                    </button>

                    <div class="swiper feedback-swiper" data-feedbacks-swiper>
                        <div class="swiper-wrapper"></div>
                    </div>

                    <button class="feedback-nav-btn" type="button" data-feedback-next>
                        Вперед
                    </button>
                </div>

                <div class="feedback-pagination" data-feedback-pagination></div>
            </div>
        </section>
    </main>

    <!-- Модалка деталей товару -->
    <div class="backdrop" data-details-modal>
        <div class="modal-content"></div>
    </div>

    <!-- Модалка замовлення -->
    <div class="backdrop" data-order-modal>
        <div class="modal-content">
            <button class="modal-close-btn" type="button" data-close-order>
                Закрити
            </button>

            <h2>Замовити зворотний зв’язок</h2>

            <form class="order-form" data-order-form>
                <label class="order-form-label">
                    <span>Ім’я</span>
                    <input class="order-form-input" type="text" name="name" placeholder="Ваше ім’я" required />
                </label>

                <label class="order-form-label">
                    <span>Телефон</span>
                    <input class="order-form-input" type="tel" name="phone" placeholder="380961234567" required />
                </label>

                <label class="order-form-label">
                    <span>Коментар</span>
                    <textarea class="order-form-textarea" name="comment" placeholder="Ваш коментар"></textarea>
                </label>

                <button class="order-form-btn" type="submit">
                    Надіслати заявку
                </button>
            </form>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" data-loader>Завантаження...</div>

    <!-- Підключення js -->
    <script type="module" src="./js/main.js"></script>
</body>

</html>
