<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Меблерія</title>

    <link rel="stylesheet" href="/src/css/header.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container header__container">
        <!-- Лого -->
        <a href="/" class="logo">
          <svg class="logo-icon" width="158" height="34">
            <use href="./img/logo.svg"></use>
          </svg>
        </a>

        <div class="header__right">
          <nav class="nav">
            <ul class="nav__list">
              <li><a href="#furniture-list">Наші меблі</a></li>
              <li><a href="#about">Про нас</a></li>
              <li><a href="#faq">Часті питання</a></li>
              <li><a href="#feedback">Відгуки</a></li>
            </ul>
          </nav>

          <!-- Кнопка -->
          <button type="button" class="header__btn">До покупок</button>
        </div>

        <!-- Бургер -->
        <button type="button" class="burger">
          <svg class="icon" width="32" height="32">
            <use href="./img/sprite.svg#menu"></use>
          </svg>
        </button>
      </div>
    </header>

    <nav id="mobileMenu" class="modal-menu hidden">
      <div class="menu_header">
        <div class="logo">
          <a href="#" class="logo">
            <svg class="logo-icon" width="158" height="34">
              <use href="./img/logo.svg"></use>
            </svg>
          </a>
        </div>
        <button class="modal-menu__close" aria-label="Закрити меню">
          <svg width="32" height="32">
            <use href="./img/sprite.svg#close"></use>
          </svg>
        </button>
      </div>
      <ul class="modal-menu__list">
        <li><a href="#furniture-list">Наші меблі</a></li>
        <li><a href="#about">Про нас</a></li>
        <li><a href="#faq">Часті питання</a></li>
        <li><a href="#feedback">Відгуки</a></li>
      </ul>
      <div class="menu_footer">
        <button type="button" class="buy_button">До покупок</button>
      </div>
    </nav>

    <main></main>
    <footer></footer>

    <script src="./js/main.js"></script>
  </body>
</html>
